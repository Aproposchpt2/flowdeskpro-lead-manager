[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,SUPABASE_SERVICE_KEY,RESEND_API_KEY,TWILIO_AUTH_TOKEN,OPENAI_API_KEY"

[functions]
  node_bundler = "esbuild"

# ─── FLOWDESK PRO LEAD MANAGER CLEAN ROUTES ───────────────────

[[redirects]]
from = "/"
to = "/index.html"
status = 200

[[redirects]]
from = "/start"
to = "/intake.html"
status = 200

[[redirects]]
from = "/intake"
to = "/intake.html"
status = 200

[[redirects]]
from = "/lead"
to = "/intake.html"
status = 200

[[redirects]]
from = "/thankyou"
to = "/thankyou.html"
status = 200

[[redirects]]
from = "/thank-you"
to = "/thankyou.html"
status = 200

[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/leads"
to = "/dashboard.html"
status = 200

# ─── SECURITY HEADERS ──────────────────────────────────────────

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  X-Frame-Options = "DENY"

[[headers]]
for = "/.netlify/functions/*"
  [headers.values]
  Access-Control-Allow-Origin = "*"
  Access-Control-Allow-Methods = "GET, POST, PATCH, OPTIONS"
  Access-Control-Allow-Headers = "Content-Type, Authorization"
