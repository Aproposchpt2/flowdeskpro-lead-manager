[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ─── CLEAN URL REDIRECTS ───────────────────────────────────────

[[redirects]]
from = "/"
to = "/landing-page.html"
status = 200

[[redirects]]
from = "/demo"
to = "/demo-request.html"
status = 200

[[redirects]]
from = "/start"
to = "/demo-request.html"
status = 200

[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/leads"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/welcome"
to = "/welcome.html"
status = 200

# ─── SECURITY HEADERS ──────────────────────────────────────────

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/.netlify/functions/*"
  [headers.values]
  Access-Control-Allow-Origin = "*"
  Access-Control-Allow-Methods = "GET, POST, OPTIONS"
  Access-Control-Allow-Headers = "Content-Type, Authorization"
