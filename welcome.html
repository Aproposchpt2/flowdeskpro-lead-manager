<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to FlowDesk Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c10;--bg-2:#0d1117;--border:rgba(255,255,255,0.07);--border-m:rgba(255,255,255,0.13);
  --blue:#2d9cdb;--blue-dim:rgba(45,156,219,0.08);--purple:#5B3FB5;--sky:#82d8ff;
  --green:#3fb950;--green-dim:rgba(63,185,80,0.1);
  --text-1:#f0f6fc;--text-2:#c9d1d9;--text-3:#8b949e;--text-4:#484f58;
  --display:'Syne',sans-serif;--serif:'DM Serif Display',serif;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --r:10px;--r-lg:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text-2);font-family:var(--sans);
  font-size:15px;line-height:1.6;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -20%,rgba(91,63,181,0.2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 85%,rgba(63,185,80,0.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(130,216,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(130,216,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0;
}

.welcome-wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:3rem 2rem;max-width:640px;
}

.check-circle{
  width:80px;height:80px;border-radius:50%;
  background:var(--green-dim);border:2px solid rgba(63,185,80,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin-bottom:2rem;
  box-shadow:0 0 40px rgba(63,185,80,0.15);
  animation:scaleIn .5s ease both;
}
@keyframes scaleIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.welcome-h1{
  font-family:var(--display);
  font-size:clamp(2.5rem,6vw,4rem);
  line-height:1.02;letter-spacing:-.05em;
  color:var(--text-1);margin-bottom:1rem;
  animation:fadeUp .6s .2s ease both;
}
.welcome-h1 em{font-family:'DM Serif Display',serif;font-style:italic;color:var(--sky);}

.welcome-sub{
  font-size:1rem;color:var(--text-3);line-height:1.75;
  margin-bottom:2.5rem;max-width:480px;
  animation:fadeUp .6s .3s ease both;
}

.btn-row{
  display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .6s .4s ease both;
}
.btn-primary{
  font-family:var(--display);font-size:.95rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  padding:.9rem 2.25rem;border-radius:8px;text-decoration:none;
  border:1px solid rgba(91,63,181,.4);
  box-shadow:0 0 30px rgba(91,63,181,.3),inset 0 1px 0 rgba(255,255,255,.1);
  transition:all .2s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 44px rgba(91,63,181,.5);}
.btn-outline{
  font-family:var(--display);font-size:.95rem;font-weight:700;color:var(--text-2);
  background:transparent;padding:.9rem 2.25rem;border-radius:8px;text-decoration:none;
  border:1px solid var(--border-m);transition:all .2s;
}
.btn-outline:hover{border-color:var(--sky);color:var(--sky);}

.footer-note{
  position:relative;z-index:1;
  font-family:var(--mono);font-size:.62rem;color:var(--text-4);
  margin-top:3rem;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="welcome-wrap">
  <div class="check-circle">✓</div>

  <h1 class="welcome-h1">
    Welcome to<br><em>FlowDesk Pro</em>
  </h1>

  <p class="welcome-sub">
    Your AI call intake system is live and working. Every call answered,
    every lead captured, every alert delivered — automatically, 24/7.
    You're ready to stop missing revenue.
  </p>

  <div class="btn-row">
    <a href="/dashboard.html" class="btn-primary">Open Lead Dashboard →</a>
    <a href="https://aiflowdeskpro.com" class="btn-outline">Back to Site</a>
  </div>
</div>

<span class="footer-note">© 2026 Apropos Group LLC · FlowDesk Pro</span>

</body>
</html>
